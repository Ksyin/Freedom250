<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Volunteer Hub | Freedom 250</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --red: #B22234; --navy: #1a1a2e; --gold: #FFD700;
            --bg: #f0f2f5; --white: #fff; --radius: 24px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color: #333; }
        .app { max-width:480px; margin:0 auto; min-height:100vh; padding-bottom:100px; }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, var(--navy) 0%, #16213e 100%);
            color: #fff; padding: 25px 20px; position: relative; overflow: hidden;
        }
        .header::before {
            content: "🤝"; position: absolute; right: -10px; top: -10px;
            font-size: 80px; opacity: 0.1;
        }
        .role-badge {
            display: inline-block; background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2); padding: 4px 12px; border-radius: 20px;
            font-size: .7rem; margin-bottom: 12px; font-weight: 700; letter-spacing: 0.5px;
        }
        .header h1 { font-size: 1.5rem; margin-bottom: 4px; }
        .header p { font-size: .8rem; opacity: .8; }

        /* ── STATS ── */
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; padding: 15px; margin-top: -30px;
        }
        .stat-card {
            background: var(--white); padding: 15px 10px; border-radius: var(--radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center;
        }
        .stat-card .val { font-size: 1.2rem; font-weight: 800; color: var(--red); display: block; }
        .stat-card .lbl { font-size: .6rem; color: #777; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

        /* ── CARDS ── */
        .section-title { padding: 0 20px; margin: 25px 0 12px; font-size: 1rem; font-weight: 800; color: var(--navy); }
        .card {
            background: var(--white); border-radius: var(--radius); margin: 0 15px 12px;
            padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .card-header i { font-size: 1.2rem; color: var(--red); }
        .card-header h3 { font-size: .95rem; font-weight: 700; }

        .list-item {
            display: flex; gap: 14px; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #eee;
        }
        .list-item:last-child { border-bottom: none; }
        .item-icon {
            width: 40px; height: 40px; border-radius: 12px; background: #f0f2f5;
            display: flex; align-items: center; justify-content: center; color: var(--navy);
        }
        .item-info { flex: 1; }
        .item-info h4 { font-size: .85rem; font-weight: 600; margin-bottom: 2px; }
        .item-info p { font-size: .7rem; color: #777; }
        .status-pill {
            font-size: .6rem; font-weight: 700; padding: 4px 10px; border-radius: 20px;
            background: #eee; color: #666;
        }
        .status-active { background: #e8f5e9; color: #2e7d32; }

        /* ── SCANNER ── */
        .scanner-preview {
            background: #f8f8fb; height: 160px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px; border: 2px dashed #ddd;
        }
        .btn-action {
            width: 100%; padding: 14px; border-radius: 14px; border: none;
            background: var(--red); color: #fff; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* ── NAVIGATION ── */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--white); display: flex; justify-content: space-around;
            padding: 12px 15px 25px; border-top: 1px solid #eee;
            max-width: 480px; margin: 0 auto; z-index: 100;
        }
        .nav-item { text-align: center; color: #aaa; font-size: .65rem; cursor: pointer; }
        .nav-item.active { color: var(--red); }
        .nav-item i { font-size: 1.3rem; display: block; margin-bottom: 4px; }

        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <div class="role-badge">VOLUNTEER FORCE</div>
        <h1 id="volunteerName">Hello, Volunteer</h1>
        <p>Operations & Participant Support</p>
        <div style="position: absolute; top: 25px; right: 20px; display: flex; gap: 8px;">
            <a href="index.html" style="color: #fff; background: rgba(255,255,255,0.1); padding: 8px 14px; border-radius: 12px; text-decoration: none; font-size: .75rem; font-weight: 700;">Home</a>
            <button id="logoutBtn" style="background: var(--red); color: #fff; border: none; padding: 8px 14px; border-radius: 12px; font-weight: 700; font-size: .75rem; cursor: pointer;">Exit</button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><span class="val" id="shiftsDone">0</span><span class="lbl">Shifts</span></div>
        <div class="stat-card"><span class="val" id="hoursLogged">0</span><span class="lbl">Hours</span></div>
        <div class="stat-card"><span class="val" id="pointsEarned">0</span><span class="lbl">Incentives</span></div>
    </div>

    <!-- ═══ TASKS PAGE ═══ -->
    <div id="pg-tasks" class="page active">
        <div class="section-title">Active Assignments</div>
        <div class="card" id="tasksList">
            <p style="text-align:center; color:#999; padding:20px; font-size:.8rem;">Connecting to ops center...</p>
        </div>

        <div class="section-title">Quick Scanner</div>
        <div class="card">
            <div class="scanner-preview" id="volunteerReader">
                <i class="fas fa-qrcode" style="font-size: 2.5rem; color: #ccc;"></i>
            </div>
            <button class="btn-action" id="startScanBtn">SCAN PARTICIPANT</button>
        </div>
    </div>

    <!-- ═══ SCHEDULE PAGE ═══ -->
    <div id="pg-schedule" class="page">
        <div class="section-title">My Schedule</div>
        <div class="card" id="scheduleList">
            <!-- Real schedule data -->
        </div>
    </div>

    <!-- ═══ NOTIFICATIONS PAGE ═══ -->
    <div id="pg-notifs" class="page">
        <div class="section-title">Ops Briefings</div>
        <div id="announcementsList">
            <!-- Real-time announcements -->
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" data-pg="tasks"><i class="fas fa-clipboard-list"></i>Tasks</div>
        <div class="nav-item" data-pg="schedule"><i class="fas fa-calendar-alt"></i>Schedule</div>
        <div class="nav-item" data-pg="notifs"><i class="fas fa-bell"></i>Briefs</div>
    </nav>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.7/html5-qrcode.min.js"></script>
<script type="module">
    import { guardDashboard, signOutUser, onAuthStateChange } from './js/auth.js';
    import { db, collection, query, orderBy, onSnapshot, doc, getDoc, updateDoc, increment, addDoc, serverTimestamp } from './js/firebase-config.js';

    await guardDashboard(['volunteer', 'admin']);

    let currentUser = null;
    let scanner = null;

    onAuthStateChange((user) => {
        if (!user) return;
        currentUser = user;
        document.getElementById('volunteerName').textContent = `Hello, ${user.displayName || 'Volunteer'}`;
        
        // Load Real Data
        initVolunteerData();
        initAnnouncements();
    });

    function initVolunteerData() {
        // Stats
        const userRef = doc(db, 'users', currentUser.uid);
        onSnapshot(userRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('shiftsDone').textContent = data.shifts || 0;
                document.getElementById('hoursLogged').textContent = data.hours || 0;
                document.getElementById('pointsEarned').textContent = data.points || 0;
            }
        });

        // Tasks - Listening to a global tasks collection or assigned to this user
        onSnapshot(collection(db, 'tasks'), (snapshot) => {
            const list = document.getElementById('tasksList');
            if (snapshot.empty) {
                list.innerHTML = '<p style="text-align:center;color:#999;padding:10px;">No tasks assigned yet.</p>';
                return;
            }
            list.innerHTML = snapshot.docs.map(doc => {
                const t = doc.data();
                return `
                    <div class="list-item">
                        <div class="item-icon"><i class="fas fa-tasks"></i></div>
                        <div class="item-info">
                            <h4>${t.title}</h4>
                            <p>${t.location} · ${t.time || 'All Day'}</p>
                        </div>
                        <span class="status-pill ${t.status==='active'?'status-active':''}">${t.status.toUpperCase()}</span>
                    </div>
                `;
            }).join('');
        });
    }

    function initAnnouncements() {
        const q = query(collection(db, 'announcements'), orderBy('createdAt', 'desc'));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('announcementsList');
            container.innerHTML = snapshot.docs.map(doc => {
                const n = doc.data();
                return `
                    <div class="card">
                        <div class="card-header"><i class="fas fa-info-circle"></i><h3>${n.title}</h3></div>
                        <p style="font-size: .85rem; line-height: 1.5;">${n.body}</p>
                        <p style="font-size: .65rem; color: #aaa; margin-top: 10px;">${new Date(n.time).toLocaleString()}</p>
                    </div>
                `;
            }).join('');
        });
    }

    // Scanner Logic
    document.getElementById('startScanBtn').addEventListener('click', () => {
        if (scanner) { scanner.stop(); scanner = null; return; }
        scanner = new Html5Qrcode("volunteerReader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (text) => {
            scanner.stop(); scanner = null;
            let uid = text;
            if (text.includes('FREEDOM250:')) uid = text.split(':')[2];
            
            // Log interaction
            await addDoc(collection(db, 'interactions'), {
                volunteerId: currentUser.uid,
                participantId: uid,
                type: 'assistance',
                timestamp: serverTimestamp()
            });
            alert('Participant Verified!');
        });
    });

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const pg = item.dataset.pg;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`pg-${pg}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            item.classList.add('active');
        });
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
        if (confirm('Exit volunteer hub?')) {
            await signOutUser();
            window.location.replace('login.html');
        }
    });
</script>

</body>
</html>
