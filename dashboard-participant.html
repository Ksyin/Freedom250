<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Freedom Passport | Freedom 250</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --red: #B22234; --navy: #1a1a2e; --gold: #FFD700;
      --bg: #f0f2f5; --white: #fff; --radius: 20px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--bg); }
    .app { max-width:480px; margin:0 auto; min-height:100vh; padding-bottom:80px; }

    /* ── HEADER ── */
    .passport-header {
      background:linear-gradient(135deg,var(--navy) 0%,#16213e 100%);
      color:#fff; padding:20px; position:relative; overflow:hidden;
    }
    .passport-header::before {
      content:"★"; position:absolute; right:-15px; top:-15px;
      font-size:110px; opacity:.06;
    }
    .passport-badge {
      display:inline-block; background:rgba(255,215,0,.18);
      border:1px solid gold; padding:3px 12px; border-radius:20px;
      font-size:.68rem; margin-bottom:12px; letter-spacing:.5px;
    }
    .passport-header h1 { font-size:1.5rem; margin-bottom:2px; }
    .passport-header p { font-size:.75rem; opacity:.7; }
    .user-stats-row {
      display:flex; gap:10px; margin-top:16px;
    }
    .stat-pill {
      background:rgba(255,255,255,.1); border-radius:30px;
      padding:8px 14px; text-align:center; flex:1;
    }
    .stat-pill .val { font-size:1.2rem; font-weight:800; color:gold; }
    .stat-pill .lbl { font-size:.6rem; opacity:.7; }

    /* ── QR SECTION ── */
    .qr-section {
      background:var(--white); margin:14px; padding:20px;
      border-radius:var(--radius); text-align:center;
      box-shadow:0 4px 14px rgba(0,0,0,.07);
    }
    .qr-box {
      width:160px; height:160px; margin:12px auto;
      background:#f5f5f5; border-radius:16px;
      display:flex; align-items:center; justify-content:center; overflow:hidden;
    }
    .qr-box img { width:100%; height:100%; object-fit:contain; }
    .freedom-id-label { font-size:.7rem; font-weight:700; color:var(--navy); margin-bottom:4px; }

    /* ── SECTIONS ── */
    .section-hdr {
      padding:0 15px; margin:22px 0 10px;
      display:flex; justify-content:space-between; align-items:baseline;
    }
    .section-hdr h2 { font-size:1rem; color:var(--navy); font-weight:700; }
    .cards-grid { display:grid; gap:12px; padding:0 15px; }

    /* ── CARD STYLES ── */
    .card {
      background:var(--white); border-radius:var(--radius); padding:14px;
      display:flex; align-items:center; gap:14px;
      box-shadow:0 3px 10px rgba(0,0,0,0.06); cursor:pointer;
    }
    .card-icon {
      width:52px; height:52px; border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.4rem; color:#fff; flex-shrink:0;
    }
    .card-info { flex:1; }
    .card-info h4 { font-size:.85rem; font-weight:700; }
    .card-info p { font-size:.68rem; color:#777; margin-top:2px; }

    /* ── NAVIGATION ── */
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0; background:var(--white);
      display:flex; justify-content:space-around; padding:10px 10px 14px;
      border-top:1px solid #eee; max-width:480px; margin:0 auto; z-index:200;
    }
    .nav-item { text-align:center; color:#aaa; font-size:.62rem; cursor:pointer; }
    .nav-item.active { color:var(--red); }
    .nav-item i { font-size:1.2rem; display:block; margin-bottom:3px; }

    /* ── TOAST ── */
    #toastContainer {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 40px); max-width: 400px; z-index: 9999;
    }
    .toast {
      background: var(--navy); color: #fff; padding: 12px 18px; border-radius: 12px;
      margin-bottom: 8px; font-size: .8rem; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }

    .page { display:none; }
    .page.active { display:block; }
  </style>
</head>
<body>

<div id="toastContainer"></div>

<div class="app">
    <!-- Header -->
    <header class="passport-header">
        <div class="passport-badge">DIGITAL PASSPORT</div>
        <h1 id="userName">Hello, Explorer</h1>
        <p>Your journey at Freedom 250</p>
        <div class="user-stats-row">
            <div class="stat-pill"><div class="val" id="userCoins">0</div><div class="lbl">Coins</div></div>
            <div class="stat-pill"><div class="val" id="userStamps">0</div><div class="lbl">Stamps</div></div>
            <div class="stat-pill"><div class="val" id="userLevel">1</div><div class="lbl">Level</div></div>
        </div>
        <div style="position: absolute; top: 20px; right: 20px;">
            <a href="index.html" style="color:#fff; background:rgba(255,255,255,.1); padding:8px 12px; border-radius:12px; text-decoration:none; font-size:.7rem; font-weight:700;">Home</a>
        </div>
    </header>

    <!-- QR Entry Pass -->
    <div class="qr-section">
        <h3>🎫 My Entry Pass</h3>
        <div class="qr-box" id="qrBox">
            <i class="fas fa-qrcode" style="font-size:2.8rem;color:#ccc"></i>
        </div>
        <div class="freedom-id-label" id="freedomIdLabel">Generating...</div>
        <p style="font-size:.65rem;color:#888;">Show at any booth to earn Liberty Coins</p>
    </div>

    <!-- ═══ HOME PAGE ═══ -->
    <div id="pg-home" class="page active">
        <div class="section-hdr"><h2>🏕️ Experience Zones</h2></div>
        <div class="cards-grid" id="zonesList"></div>

        <div class="section-hdr"><h2>⚡ Live Challenges</h2></div>
        <div class="cards-grid" id="challengesList"></div>
    </div>

    <!-- ═══ REWARDS PAGE ═══ -->
    <div id="pg-rewards" class="page">
        <div class="section-hdr"><h2>🎁 Rewards Store</h2></div>
        <div class="cards-grid" id="rewardsList"></div>
    </div>

    <!-- ═══ RANK PAGE ═══ -->
    <div id="pg-rank" class="page">
        <div class="section-hdr"><h2>🏆 Leaderboard</h2></div>
        <div id="leaderboardList"></div>
    </div>

    <!-- ═══ PROFILE PAGE ═══ -->
    <div id="pg-profile" class="page">
        <div class="section-hdr"><h2>👤 My Profile</h2></div>
        <div class="card" style="margin: 0 15px 15px; flex-direction: column; text-align: center;">
            <div style="width:70px; height:70px; background:var(--navy); color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.8rem; margin-bottom:12px;">
                <i class="fas fa-user"></i>
            </div>
            <h3 id="pName">—</h3>
            <p id="pEmail" style="color:#777; font-size:.8rem;">—</p>
            <div style="margin-top:15px; font-size:.7rem; color:#aaa; font-weight:700;" id="pFreedomId">...</div>
            <button id="logoutBtn" style="background:var(--red); color:#fff; border:none; padding:12px 24px; border-radius:15px; font-weight:700; margin-top:20px; cursor:pointer; width:100%;">LOGOUT</button>
        </div>
    </div>

    <!-- ── NAVIGATION ── -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-pg="home" onclick="showPage('home')"><i class="fas fa-passport"></i>Passport</div>
        <div class="nav-item" data-pg="rewards" onclick="showPage('rewards')"><i class="fas fa-gift"></i>Rewards</div>
        <div class="nav-item" data-pg="rank" onclick="showPage('rank')"><i class="fas fa-chart-line"></i>Rank</div>
        <div class="nav-item" data-pg="profile" onclick="showPage('profile')"><i class="fas fa-user"></i>Profile</div>
    </nav>
</div>

<script type="module">
    import { guardDashboard, signOutUser, onAuthStateChange, initAuth } from './js/auth.js';
    import { db, collection, onSnapshot, query, orderBy, limit, doc, getDoc, updateDoc, increment, serverTimestamp, setDoc } from './js/firebase-config.js';
    import { generateQRCode } from './js/qr-generator.js';

    await initAuth();
    
    let currentUser = null;

    onAuthStateChange(async (user) => {
        if (!user) { window.location.replace('login.html'); return; }
        currentUser = user;
        document.getElementById('userName').textContent = `Hello, ${user.displayName || 'Explorer'}`;
        document.getElementById('pName').textContent = user.displayName;
        document.getElementById('pEmail').textContent = user.email;
        document.getElementById('pFreedomId').textContent = user.freedomId;
        
        const qrText = `FREEDOM250:${user.freedomId}:${user.uid}`;
        const dataUrl = await generateQRCode(qrText);
        document.getElementById('qrBox').innerHTML = `<img src="${dataUrl}" style="width:100%">`;
        document.getElementById('freedomIdLabel').textContent = user.freedomId;

        initData();
    });

    function showToast(msg) {
        const container = document.getElementById('toastContainer');
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        container.appendChild(t);
        setTimeout(() => t.remove(), 4000);
    }

    function initData() {
        // User Real-time Data
        onSnapshot(doc(db, 'users', currentUser.uid), (docSnap) => {
            const data = docSnap.data();
            document.getElementById('userCoins').textContent = data.points || 0;
            document.getElementById('userStamps').textContent = data.stamps?.length || 0;
            document.getElementById('userLevel').textContent = Math.floor((data.points || 0) / 500) + 1;
        });

        // Zones
        onSnapshot(collection(db, 'boothCounts'), (snapshot) => {
            const list = document.getElementById('zonesList');
            if (snapshot.empty) { list.innerHTML = '<p style="text-align:center;color:#999;font-size:.8rem;width:100%;">No zones active yet.</p>'; return; }
            list.innerHTML = snapshot.docs.map(doc => {
                const z = doc.data();
                return `
                    <div class="card">
                        <div class="card-icon" style="background:var(--navy)"><i class="fas fa-map-marker-alt"></i></div>
                        <div class="card-info">
                            <h4>${z.name}</h4>
                            <p>Activity level: ${z.scans > 100 ? 'High' : 'Low'}</p>
                        </div>
                        <div style="font-size:.65rem; background:#e8f5e9; color:#2e7d32; padding:4px 8px; border-radius:10px; font-weight:700;">LIVE</div>
                    </div>
                `;
            }).join('');
        });

        // Challenges
        onSnapshot(collection(db, 'challenges'), (snapshot) => {
            const list = document.getElementById('challengesList');
            if (snapshot.empty) { list.innerHTML = '<p style="text-align:center;color:#999;font-size:.8rem;width:100%;">Missions coming soon!</p>'; return; }
            list.innerHTML = snapshot.docs.map(doc => {
                const c = doc.data();
                return `
                    <div class="card">
                        <div class="card-icon" style="background:var(--red)"><i class="fas fa-bolt"></i></div>
                        <div class="card-info">
                            <h4>${c.name}</h4>
                            <p>Reward: ${c.pts} coins</p>
                        </div>
                    </div>
                `;
            }).join('');
        });

        // Rewards
        onSnapshot(collection(db, 'rewards'), (snapshot) => {
            const list = document.getElementById('rewardsList');
            if (snapshot.empty) { list.innerHTML = '<p style="text-align:center;color:#999;font-size:.8rem;width:100%;">Store is restocking...</p>'; return; }
            list.innerHTML = snapshot.docs.map(doc => {
                const r = doc.data();
                const canAfford = (currentUser.points || 0) >= r.cost;
                return `
                    <div class="card">
                        <div class="card-info">
                            <h4>${r.name}</h4>
                            <p>Cost: ${r.cost} coins</p>
                        </div>
                        <button onclick="redeemReward('${doc.id}', ${r.cost})" ${canAfford ? '' : 'disabled'} style="background:${canAfford ? 'var(--red)' : '#ccc'};color:#fff;border:none;padding:8px 16px;border-radius:10px;font-size:.7rem;font-weight:700;">REDEEM</button>
                    </div>
                `;
            }).join('');
        });

        // Leaderboard
        onSnapshot(query(collection(db, 'users'), orderBy('points', 'desc'), limit(10)), (snapshot) => {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = snapshot.docs.map((doc, i) => {
                const u = doc.data();
                return `
                    <div class="card" style="margin: 0 15px 10px;">
                        <div style="font-weight:900; color:var(--gold); width:25px;">${i+1}</div>
                        <div class="card-info"><h4>${u.displayName || 'Explorer'}</h4></div>
                        <div style="font-weight:800;color:var(--red)">${u.points || 0}</div>
                    </div>
                `;
            }).join('');
        });
    }

    window.redeemReward = async (id, cost) => {
        if (!confirm('Confirm redemption?')) return;
        try {
            await updateDoc(doc(db, 'users', currentUser.uid), { points: increment(-cost) });
            showToast('Reward Redeemed! Visit the reward desk.');
        } catch (e) { alert(e.message); }
    };

    window.showPage = (page) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`pg-${page}`).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.pg === page));
        window.scrollTo(0,0);
    };

    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await signOutUser();
        window.location.replace('login.html');
    });
</script>

</body>
</html>
